<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operadores e comparações</title>
</head>
<body>
    <h2>Exemplo ==</h2>
    <script>
        if (5 == "5"){  //aqui falamos para ele ver apenas se o 5 é igual sem contar se o tipo é número ou texto
            document.write("Verdadeiro");
        } else {
            document.write("Falso");
        }
    </script>

     <h2>Exemplo ===</h2>
    <script>
        if (5 === "5"){  //aqui falamos para ele ver se é igual verificando o tipo tambem, sendo mais segures porque ele lida mantendo valores diferentes como eles são
            document.write("Verdadeiro");
        } else {
            document.write("Falso");
        }
    </script>

    <h2>Exemplo !=</h2>
    <script>
        if (5 != "5"){  //aqui falamos para ele ver se é DIFERENTE sem verificar o tipo
            document.write("Verdadeiro");
        } else {
            document.write("Falso");
        }
    </script>

    <h2>Exemplo !==</h2>
    <script>
        if (5 !== "5"){  //Já nesse caso pedimos para verificar se o tipo é diferente
            document.write("Verdadeiro");
        } else {
            document.write("Falso");
        }
    </script>


</body>
</html>
