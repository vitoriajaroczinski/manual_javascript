<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condicionais</title>
</head>
<body>
    <!--If-->

<h2>Estoque (IF)</h2>

<script>
    let estoque = Number(prompt("Digite a quantidade de itens no estoque:"));
    if(estoque >= 100){
        document.write("O estoque está cheio com ", estoque, " itens");
    }
</script>


<!--If e Else-->

<h2>Nota de matemática (IF e Else)</h2>
<script>
    let nota_matematica = Number(prompt("Digite sua nota de matemática:"));

    if (nota_matematica >= 7){
        document.write("Parabéns você foi aprovado");
    } else {
        document.write("Você foi reprovado");
    }


  
</script>

<!--Switch-->

<h2>Auxilio da familia (Switch)</h2>
<script>
    let dependentes = Number(prompt("Digite a quantidade de dependentes:"));
    let auxilio;

    if (dependentes >= 1 && dependentes <= 2) {
        auxilio = 100;
    } else if (dependentes >= 3 && dependentes <= 4) {
        auxilio = 200;
    } else if (dependentes > 4) {
        auxilio = 300;
    } else {
        auxilio = 0; 
    }

    document.write("Valor do auxílio: R$ ", auxilio);
</script>
</body>
</html>
