<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repetição</title>
</head>
<body>
    <h2>For</h2>
    <script>
        for(let i= 1; i <=10; i++){ //Para um i menor que 10 o 1 era adionado a cada tentativa.
            document.write(i +"<br>");
        }
    </script>

    <h2>While</h2>
    <script>
        let i = 1;

        while(i<=10){ // Enquanto o i não chegava a 10 foi sendo adicionado 1.
            document.write(i +"<br>");
            i++;
        }
    </script>
</body>
</html>
